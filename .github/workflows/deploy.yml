name: Deploy to GCP

on:
  push:
    branches:
      - master

env:
  GCP_ZONE: europe-north1-a
  GCP_INSTANCE: terraform-instance
  REMOTE_DIR: ~/app
  APP_PORT: 8080
  APP_INTERNAL_PORT: 8080

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m
          skip-cache: false

  terraform:
    needs: lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_app_port: ${{ env.APP_PORT }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_app_port: ${{ env.APP_PORT }}

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate SSH keys
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/google_compute_engine -N "" -C ""

      - name: Deploy to server
        run: |
          tar cz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='node_modules' \
            . | gcloud compute ssh ${GCP_INSTANCE} \
              --zone=${GCP_ZONE} \
              --quiet \
              --strict-host-key-checking=no \
              --command="
                mkdir -p ${REMOTE_DIR} &&
                tar xz -C ${REMOTE_DIR}
              "

      - name: Run deployment script
        run: |
          gcloud compute ssh ${GCP_INSTANCE} \
            --zone=${GCP_ZONE} \
            --quiet \
            --strict-host-key-checking=no \
            --command="
              cd ${REMOTE_DIR} &&
              chmod +x scripts/deploy-server.sh &&
              SERVICE=api APP_PORT=8080 APP_INTERNAL_PORT=8080 ./scripts/deploy-server.sh &
              SERVICE=frontend APP_PORT=3000 APP_INTERNAL_PORT=3000 ./scripts/deploy-server.sh &
              wait
              echo 'Both services deployed successfully'
            "

      - name: Get instance IP
        run: |
          IP=$(gcloud compute instances describe ${GCP_INSTANCE} \
            --zone=${GCP_ZONE} \
            --quiet \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Deployment successful! App running at http://${IP}:${APP_PORT}"
